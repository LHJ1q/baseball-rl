name: baseball-rl
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11
  - pip
  # CPU/MPS users (Macbook): comment out the next two lines and uncomment cpuonly.
  - pytorch>=2.7
  - pytorch-cuda=12.8     # Blackwell (RTX Pro 4500) needs cu128; A100 also works on cu128.
  # - cpuonly             # uncomment for Macbook / CPU-only smoke tests
  - pandas=2.3.3
  - pyarrow=24.0.0
  - numpy=2.2.6
  - tqdm=4.67.3
  - pytest=9.0.3
  - pip:
      - pybaseball==2.2.7   # not on conda-forge
      - -e .                # editable install of this repo (registers `src` as a package)
